<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B5BFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#8AA5FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050505"/>

  <!-- Grid lines horizontal -->
  <g stroke="#8AA5FF" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  <!-- Grid lines vertical -->
  <g stroke="#8AA5FF" stroke-opacity="0.06" stroke-width="1">
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow -->
  <ellipse cx="600" cy="315" rx="420" ry="280" fill="url(#glow)"/>

  <!-- Logo top-left -->
  <circle cx="56" cy="44" r="14" fill="#8AA5FF" fill-opacity="0.15"/>
  <text x="56" y="50" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#8AA5FF" text-anchor="middle">S</text>
  <text x="80" y="50" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#F2F2F2">SyncAgency</text>

  <!-- Eyebrow -->
  <rect x="446" y="196" width="308" height="24" rx="12" fill="#8AA5FF" fill-opacity="0.10"/>
  <text x="600" y="213" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8AA5FF" text-anchor="middle" letter-spacing="1.5">CRM • TELEGRAM • CREATOR AGENCIES</text>

  <!-- Main title -->
  <text x="600" y="296" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="#F2F2F2" text-anchor="middle">The CRM for creator</text>
  <text x="600" y="358" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="#8AA5FF" text-anchor="middle">talent agencies</text>
  <text x="600" y="420" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="#F2F2F2" text-anchor="middle">on Telegram.</text>

  <!-- Subtitle -->
  <text x="600" y="470" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#888888" text-anchor="middle">Content Library · Broadcast Campaigns · Payment Processing · 7-day free trial</text>

  <!-- Bottom badge -->
  <rect x="490" y="558" width="220" height="28" rx="14" fill="#8AA5FF" fill-opacity="0.12" stroke="#8AA5FF" stroke-opacity="0.25" stroke-width="1"/>
  <text x="600" y="577" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8AA5FF" text-anchor="middle">syncagency-en.vercel.app</text>
</svg>
